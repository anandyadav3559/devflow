name: Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    name: Formatting, Unit, and Race Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt formatting
        shell: bash
        run: |
          set -euo pipefail
          GO_FILES="$(git ls-files '*.go' ':!:vendor/**')"
          if [ -z "${GO_FILES}" ]; then
            echo "No Go files found."
            exit 0
          fi
          UNFORMATTED="$(gofmt -l ${GO_FILES})"
          if [ -n "${UNFORMATTED}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...
