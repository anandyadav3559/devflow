workflow_name: test_logs_workflow
log: true
services:
  echo_svc:
    command: bash
    args: ["-c", "echo 'Hello World' && sleep 1 && echo 'Goodbye World'"]
    detached: true
  
  printer_svc:
    command: bash
    args: ["-c", "for i in {1..3}; do echo 'Printing $i'; sleep 1; done"]
    detached: true
    depends_on: ["echo_svc"]
